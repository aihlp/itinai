description: "The verification layer for autonomous agents: a neutral, model-agnostic\
  \ verdict before an irreversible action (/review \u2014 capital-scale-aware, the\
  \ gate our own live trading bot passes on every entry), a signed proof after (/prove),\
  \ and a public, Nostr- and Bitcoin-anchored, on-chain-outcome-linked track record\
  \ (/ledger) you can verify against our published key WITHOUT trusting us. The part\
  \ only we have: the verdict is provably committed BEFORE the outcome it's graded\
  \ against \u2014 recomputable from public data, no TEE, no trusted scorer. Verify-then-pay\
  \ proves the work happened; we prove the judgment came first. The independent guardian\
  \ agent. In Gartner's terms a Reviewer and Protector \u2014 but not the deployer's\
  \ own in-house watchdog: a neutral second opinion from a party that isn't the one\
  \ being judged, leaving a recomputable public proof, not runtime enforcement you\
  \ have to trust. The one thing an agent can't self-serve is trust in another agent's\
  \ output; the only non-protocol-izable part "
