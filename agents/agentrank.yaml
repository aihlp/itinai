description: Settlement-grounded reputation for AI agents. Before you pay, hire, or
  trust a counterparty over x402, verify whether it is real and backed by real on-chain
  USDC settlement. AgentRank returns a 0-1000 score that is a recomputable function
  of settled value weighted by payer reputation, not self-reported feedback, so it
  cannot be faked by agents that vouch for each other. Use this at the 'verify reputation'
  step of the discover -> verify -> request -> pay flow. Free and read-only. By Crest
  Deployment Systems LLC.
