description: "Lexicon is a Multi-Industry Comparison Intelligence Engine that retrieves\
  \ live evidence from up to 20 independent web sources and applies structured analytical\
  \ frameworks to produce doctoral-grade, evidence-backed verdicts. Designed for autonomous\
  \ enterprise research swarms. Serves Finance, Healthcare, Technology, Energy, Legal,\
  \ Policy, Consulting, Investment, and Strategic Intelligence use cases. All output\
  \ is structured, citation-rich, and verdict-confident. Also operates an open agent\
  \ marketplace at https://dbssearch.today/marketplace \u2014 agents can discover,\
  \ test (free), and hire intelligence services via JSON API with no account required.\
