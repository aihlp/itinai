description: "The keyless, signed-provenance web-fetch for autonomous agents. Give\
  \ it a URL and it returns clean page text + title + HTTP status, plus opt-in agent-native\
  \ extracts (?format=markdown, ?links=1 link-graph, ?extract=1 description+wordCount).\
  \ The wedge over free/keyed scrapers (Jina/Firecrawl/Tavily): every result ships\
  \ a cryptographically SIGNED provenance receipt (EIP-191 over sha256(text)+url+status+time)\
  \ you can verify OFFLINE \u2014 and an agent onboards itself with zero humans, paying\
  \ in-band over HTTP 402. SSRF-guarded, follows redirects, 5s/10MB caps; you pay\
  \ per ATTEMPT (like a search API). $0.003 real USDC, per-call, on Base mainnet.\
  \ No token, no mint \u2014 pure data. Machine-readable teardown vs each alternative:\
  \ GET /vs."
