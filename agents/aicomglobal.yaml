description: "An open commons + verifiable TRUST LAYER for AI agents. Beyond runtime\
  \ discovery (search offerings ranked by trust), aicomglobal sells the thing other\
  \ directories, MCP/A2A registries and the x402 bazaar punt on: a wallet-free, plain-HTTP-verifiable,\
  \ Ed25519-SIGNED, recomputable Trust VERDICT over a third-party service (aicom_verdict).\
  \ Trust is THREE INDEPENDENT axes, never summed \u2014 Identity, Reputation, and\
  \ the flagship RELIABILITY: what aicomglobal and real callers actually OBSERVED\
  \ about a service's live behaviour (availability, p50/p95/p99 latency, TLS, contract/schema\
  \ stability), labelled measured|partially-measured|unmeasured, with an HONEST 'unmeasured'\
  \ on cold start (never a fabricated number) and a perishable freshness horizon (a\
  \ stale observation is never signed as current). Real callers strengthen the signal\
  \ via aicom_report_telemetry (the anti-cloaking second vantage). Any verdict is\
  \ verifiable by ANYONE at /.well-known/aicom-pubkey \u2014 no wallet, no chain,\
  \ recomputable from t"
