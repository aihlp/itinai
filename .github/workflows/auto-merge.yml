name: Auto-merge WordPress Submissions

on:
  workflow_run:
    workflows: ["Validate Agent Manifests"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Check if triggered by WordPress submission PR
        id: check-wp-submission
        run: |
          # Get the SHA from the workflow run
          SHA="${{ github.event.workflow_run.head_sha }}"
          REPO="${{ github.repository }}"
          
          # Search for PR associated with this SHA
          PR_DATA=$(gh api "/repos/$REPO/commits/$SHA/pulls" --jq '.[0]')
          
          if [ -z "$PR_DATA" ] || [ "$PR_DATA" = "null" ]; then
            echo "No PR associated with SHA $SHA"
            echo "is_wp_submission=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          PR_NUMBER=$(echo "$PR_DATA" | jq -r '.number')
          HEAD_REF=$(echo "$PR_DATA" | jq -r '.head.ref')
          
          echo "Found PR #$PR_NUMBER from branch: $HEAD_REF"
          
          # Check for various automated submission patterns:
          # - submit/* : WordPress submissions
          # - itinai-* : ITINAI agent submissions
          if [[ "$HEAD_REF" == submit/* ]] || [[ "$HEAD_REF" == itinai-* ]]; then
            echo "is_wp_submission=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
          else
            echo "is_wp_submission=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Merge validated WordPress submission
        if: steps.check-wp-submission.outputs.is_wp_submission == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.check-wp-submission.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          echo "Merging PR #$PR_NUMBER from branch with pattern submit/* or itinai-*"
          gh pr merge "$PR_NUMBER" \
            --repo "$REPO" \
            --squash \
            --delete-branch
