name: Auto-merge Automated PRs

on:
  workflow_run:
    workflows: ["Validate Agent Manifests"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Check if triggered by automated PR
        id: check-auto-pr
        run: |
          # Get the SHA from the workflow run
          SHA="${{ github.event.workflow_run.head_sha }}"
          REPO="${{ github.repository }}"
          
          # Search for PR associated with this SHA
          PR_DATA=$(gh api "/repos/$REPO/commits/$SHA/pulls" --jq '.[0]')
          
          if [ -z "$PR_DATA" ] || [ "$PR_DATA" = "null" ]; then
            echo "No PR associated with SHA $SHA"
            echo "is_automated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          PR_NUMBER=$(echo "$PR_DATA" | jq -r '.number')
          HEAD_REF=$(echo "$PR_DATA" | jq -r '.head.ref')
          
          echo "Found PR #$PR_NUMBER from branch: $HEAD_REF"
          
          # Check for automated PR patterns:
          # - submit/* : WordPress submissions
          # - itinai-* : ITINAI agent submissions
          # - codex/sync-external-agents : External agent sync
          # - auto-cleanup-offline-agents : Offline agent cleanup
          if [[ "$HEAD_REF" == submit/* ]] || [[ "$HEAD_REF" == itinai-* ]] || [[ "$HEAD_REF" == "codex/sync-external-agents" ]] || [[ "$HEAD_REF" == "auto-cleanup-offline-agents" ]]; then
            echo "is_automated=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
          else
            echo "is_automated=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Merge validated automated PR
        if: steps.check-auto-pr.outputs.is_automated == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.check-auto-pr.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          echo "Merging PR #$PR_NUMBER from automated branch: ${{ steps.check-auto-pr.outputs.head_ref }}"
          gh pr merge "$PR_NUMBER" \
            --repo "$REPO" \
            --squash \
            --delete-branch
