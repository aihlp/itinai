name: Auto-merge Automated Submissions

on:
  workflow_run:
    workflows: ["Validate Agent Manifests"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Check if triggered by automated PR
        id: check-auto-submission
        run: |
          # Get the SHA from the workflow run
          SHA="${{ github.event.workflow_run.head_sha }}"
          REPO="${{ github.repository }}"
          
          # Search for PR associated with this SHA
          PR_DATA=$(gh api "/repos/$REPO/commits/$SHA/pulls" --jq '.[0]')
          
          if [ -z "$PR_DATA" ] || [ "$PR_DATA" = "null" ]; then
            echo "No PR associated with SHA $SHA"
            echo "is_auto_submission=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          PR_NUMBER=$(echo "$PR_DATA" | jq -r '.number')
          HEAD_REF=$(echo "$PR_DATA" | jq -r '.head.ref')
          
          echo "Found PR #$PR_NUMBER from branch: $HEAD_REF"
          
          # Check for various automated submission patterns:
          # - submit/* : WordPress submissions
          # - itinai-* : ITINAI agent submissions
          # - codex/sync-external-agents : External agent sync
          # - auto-cleanup-offline-agents : Offline agent cleanup
          if [[ "$HEAD_REF" == submit/* ]] || [[ "$HEAD_REF" == itinai-* ]] || [[ "$HEAD_REF" == "codex/sync-external-agents" ]] || [[ "$HEAD_REF" == "auto-cleanup-offline-agents" ]]; then
            echo "is_auto_submission=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
            echo "Validation passed (always passes for automated sync workflows)"
          else
            echo "is_auto_submission=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Dismiss code owner review request for automated PR
        if: steps.check-auto-submission.outputs.is_auto_submission == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.check-auto-submission.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          echo "Dismissing review requests for PR #$PR_NUMBER"
          # Dismiss any review requests on this PR
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-reviewer aihlp || true
          # Also try to dismiss any pending reviews
          gh api \
            --method DELETE \
            "/repos/$REPO/pulls/$PR_NUMBER/requested_reviewers" \
            --input - <<EOF || true
          {"reviewers": ["aihlp"]}
          EOF

      - name: Merge validated automated submission
        if: steps.check-auto-submission.outputs.is_auto_submission == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.check-auto-submission.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          echo "Merging PR #$PR_NUMBER from branch ${{ steps.check-auto-submission.outputs.head_ref }}"
          echo "Validation was performed in the validate workflow and passed"
          gh pr merge "$PR_NUMBER" \
            --repo "$REPO" \
            --squash \
            --delete-branch
