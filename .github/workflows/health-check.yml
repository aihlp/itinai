name: Health Check Agents

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run health check
        id: health
        continue-on-error: true
        run: python scripts/health-check.py --output health-results.json

      - name: Upload health results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-results
          path: health-results.json

      - name: Create issue after failed scheduled check
        if: github.event_name == 'schedule' && steps.health.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('health-results.json', 'utf8'));
            const failed = report.results.filter((item) => !item.ok);
            if (!failed.length) return;

            const title = `Agent health check failed: ${failed.map((item) => item.agent_id).join(', ')}`;
            const body = [
              'The scheduled health check found unavailable agents.',
              '',
              ...failed.map((item) => `- ${item.agent_id}: ${item.url} (${item.error || item.status_code})`),
              '',
              'If an agent fails three checks in a row, consider marking it offline or contacting the owner.'
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'health-check'
            });

            const duplicate = existing.data.find((issue) => issue.title === title);
            if (duplicate) return;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['health-check']
            });
