name: Validate Agent Manifests

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: validate-agent-manifests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      is_automated: ${{ steps.check-auto.outputs.is_automated }}
      validation_passed: ${{ steps.validation-result.outputs.passed || 'false' }}
    steps:
      - name: Check if automated PR
        id: check-auto
        run: |
          if [[ "${{ github.head_ref }}" == "codex/sync-external-agents" ]] || [[ "${{ github.head_ref }}" == "auto-cleanup-offline-agents" ]]; then
            echo "is_automated=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_automated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if WordPress submission PR or ITINAI agent submission
        id: check-wp-submission
        run: |
          # Check for various automated submission patterns:
          # - submit/* : WordPress submissions
          # - itinai-* : ITINAI agent submissions
          if [[ "${{ github.head_ref }}" == submit/* ]] || [[ "${{ github.head_ref }}" == itinai-* ]]; then
            echo "is_wp_submission=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_wp_submission=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository (automated sync/cleanup PRs)
        if: steps.check-auto.outputs.is_automated == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python (automated sync/cleanup PRs)
        if: steps.check-auto.outputs.is_automated == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (automated sync/cleanup PRs)
        if: steps.check-auto.outputs.is_automated == 'true'
        timeout-minutes: 3
        run: python -m pip install -r requirements.txt

      - name: Collect changed agent manifests (automated sync/cleanup PRs)
        if: steps.check-auto.outputs.is_automated == 'true'
        id: collect-changes-auto
        run: |
          echo "Collecting changed agents for PR ${{ github.head_ref }}"
          git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" -- 'agents/*.yaml' > changed-agents.txt
          echo "Changed files:"
          cat changed-agents.txt

      - name: Run validation for automated sync/cleanup PRs
        if: steps.check-auto.outputs.is_automated == 'true'
        id: validate-auto
        timeout-minutes: 5
        run: |
          echo "Running validation for automated PR (${{ github.head_ref }})"
          python scripts/validate.py --schema schemas/agent-manifest.schema.json agents/*.yaml
          VALIDATION_EXIT_CODE=$?
          if [ $VALIDATION_EXIT_CODE -ne 0 ]; then
            echo "Schema validation failed with exit code $VALIDATION_EXIT_CODE"
            exit $VALIDATION_EXIT_CODE
          fi
          echo "Schema validation completed successfully"

      - name: Check Agent Card availability (automated sync/cleanup PRs)
        if: steps.check-auto.outputs.is_automated == 'true'
        id: health-check-auto
        timeout-minutes: 5
        run: |
          echo "Checking health for changed agents in automated PR"
          python scripts/health-check.py --agent-card-only --paths-file changed-agents.txt --output health-results.json --allow-unhealthy
          HEALTH_EXIT_CODE=$?
          if [ $HEALTH_EXIT_CODE -ne 0 ]; then
            echo "Health check failed with exit code $HEALTH_EXIT_CODE"
            exit $HEALTH_EXIT_CODE
          fi
          echo "Health check completed successfully"

      - name: Set validation result for automated PRs
        if: always() && steps.check-auto.outputs.is_automated == 'true'
        id: validation-result
        run: |
          # Check if all required steps succeeded
          COLLECT_OUTCOME="${{ steps.collect-changes-auto.outcome }}"
          VALIDATE_OUTCOME="${{ steps.validate-auto.outcome }}"
          HEALTH_OUTCOME="${{ steps.health-check-auto.outcome }}"
          
          echo "Collect outcome: $COLLECT_OUTCOME"
          echo "Validation outcome: $VALIDATE_OUTCOME"
          echo "Health check outcome: $HEALTH_OUTCOME"
          
          # All steps must succeed for overall validation to pass
          if [[ "$COLLECT_OUTCOME" == "success" ]] && \
             [[ "$VALIDATE_OUTCOME" == "success" ]] && \
             [[ "$HEALTH_OUTCOME" == "success" ]]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
            echo "Validation and health check passed for automated PR"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            echo "Validation or health check failed for automated PR"
            # Don't exit with error here - let the job complete successfully
            # The dummy job will handle the failure case
          fi

      - name: Skip validation for fully automated PRs (sync/cleanup) - DEPRECATED
        if: false
        run: |
          echo "This step is deprecated - validation now runs for automated PRs"

      - name: Dummy step for fully automated PR success - DEPRECATED
        if: false
        run: echo "This step is deprecated"

      - name: Check out repository (WordPress or ITINAI submission)
        if: steps.check-wp-submission.outputs.is_wp_submission == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python (WordPress or ITINAI submission)
        if: steps.check-wp-submission.outputs.is_wp_submission == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (WordPress or ITINAI submission)
        if: steps.check-wp-submission.outputs.is_wp_submission == 'true'
        timeout-minutes: 3
        run: python -m pip install -r requirements.txt

      - name: Collect changed agent manifests (WordPress or ITINAI submission)
        if: steps.check-wp-submission.outputs.is_wp_submission == 'true'
        run: |
          echo "Collecting changed agents for PR ${{ github.head_ref }}"
          git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" -- 'agents/*.yaml' > changed-agents.txt
          echo "Changed files:"
          cat changed-agents.txt
          if [ ! -s changed-agents.txt ]; then
            echo "No agent manifest changes detected"
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "no_changes=false" >> "$GITHUB_OUTPUT"
          fi
        id: collect-changes

      - name: Validate changed manifest schema (WordPress or ITINAI submission)
        if: steps.check-wp-submission.outputs.is_wp_submission == 'true' && steps.collect-changes.outputs.no_changes == 'false'
        timeout-minutes: 2
        run: |
          echo "Validating schema for changed agent manifests only"
          while IFS= read -r file; do
            echo "Validating: $file"
            python scripts/validate.py --schema schemas/agent-manifest.schema.json "$file"
          done < changed-agents.txt

      - name: Check Agent Card availability (WordPress or ITINAI submission)
        if: steps.check-wp-submission.outputs.is_wp_submission == 'true' && steps.collect-changes.outputs.no_changes == 'false'
        timeout-minutes: 5
        run: |
          echo "Checking health for changed agents only"
          python scripts/health-check.py --agent-card-only --paths-file changed-agents.txt --output health-results.json --allow-unhealthy

      - name: Upload health results (WordPress or ITINAI submission)
        if: always() && steps.check-wp-submission.outputs.is_wp_submission == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: validation-health-results-${{ github.head_ref }}
          path: health-results.json

      - name: Upload validation results (WordPress or ITINAI submission)
        if: always() && steps.check-wp-submission.outputs.is_wp_submission == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: validation-results-${{ github.head_ref }}
          path: |
            agents/*.yaml
            schemas/agent-manifest.schema.json

      - name: Check out repository (manual PRs)
        if: steps.check-auto.outputs.is_automated == 'false' && steps.check-wp-submission.outputs.is_wp_submission == 'false'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python (manual PRs)
        if: steps.check-auto.outputs.is_automated == 'false' && steps.check-wp-submission.outputs.is_wp_submission == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (manual PRs)
        if: steps.check-auto.outputs.is_automated == 'false' && steps.check-wp-submission.outputs.is_wp_submission == 'false'
        timeout-minutes: 3
        run: python -m pip install -r requirements.txt

      - name: Validate manifest schema (manual PRs)
        if: steps.check-auto.outputs.is_automated == 'false' && steps.check-wp-submission.outputs.is_wp_submission == 'false'
        timeout-minutes: 2
        run: python scripts/validate.py

      - name: Collect changed agent manifests (manual PRs)
        if: steps.check-auto.outputs.is_automated == 'false' && steps.check-wp-submission.outputs.is_wp_submission == 'false'
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" -- 'agents/*.yaml' > changed-agents.txt
          else
            find agents -maxdepth 1 -name '*.yaml' | sort > changed-agents.txt
          fi

      - name: Check Agent Card availability (manual PRs)
        if: steps.check-auto.outputs.is_automated == 'false' && steps.check-wp-submission.outputs.is_wp_submission == 'false'
        timeout-minutes: 5
        run: python scripts/health-check.py --agent-card-only --paths-file changed-agents.txt --output health-results.json --allow-unhealthy

      - name: Upload health results (manual PRs)
        if: always() && steps.check-auto.outputs.is_automated == 'false' && steps.check-wp-submission.outputs.is_wp_submission == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: validation-health-results
          path: health-results.json

      - name: Upload validation results (manual PRs)
        if: always() && steps.check-auto.outputs.is_automated == 'false' && steps.check-wp-submission.outputs.is_wp_submission == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: validation-results
          path: |
            agents/*.yaml
            schemas/agent-manifest.schema.json

  # Dummy job that only runs for automated PRs
  # It checks if validation passed and completes accordingly
  # This job should be added as a required check in branch protection
  validate-automated-complete:
    runs-on: ubuntu-latest
    needs: [validate]
    if: needs.validate.outputs.is_automated == 'true'
    steps:
      - name: Check validation result and mark complete
        id: check-result
        run: |
          VALIDATION_PASSED="${{ needs.validate.outputs.validation_passed }}"
          echo "Validation passed: $VALIDATION_PASSED"
          
          if [[ "$VALIDATION_PASSED" == "true" ]]; then
            echo "Validation completed successfully for automated PR"
            echo "Ready for auto-merge"
            exit 0
          else
            echo "Validation failed for automated PR"
            exit 1
          fi
