name: Validate Agent Manifests

on:
  pull_request:
    paths:
      - "agents/*.yaml"
      - "schemas/agent-manifest.schema.json"
      - "scripts/validate.py"
      - "scripts/health-check.py"
      - ".github/workflows/validate.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate manifest schema
        run: python scripts/validate.py

      - name: Check Agent Card availability
        run: python scripts/health-check.py --agent-card-only --output health-results.json

      - name: Upload health results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-health-results
          path: health-results.json
