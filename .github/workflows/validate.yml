name: Validate Agent Manifests

on:
  pull_request:
    paths:
      - "agents/*.yaml"
      - "schemas/agent-manifest.schema.json"
      - "scripts/validate.py"
      - "scripts/health-check.py"
      - "scripts/sync-wordpress.py"
      - ".github/workflows/health-check.yml"
      - ".github/workflows/sync-external.yml"
      - ".github/workflows/sync-wordpress.yml"
      - ".github/workflows/validate.yml"
  workflow_dispatch:

concurrency:
  group: validate-agent-manifests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        timeout-minutes: 3
        run: python -m pip install -r requirements.txt

      - name: Validate manifest schema
        timeout-minutes: 2
        run: python scripts/validate.py

      - name: Collect changed agent manifests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" -- 'agents/*.yaml' > changed-agents.txt
          else
            find agents -maxdepth 1 -name '*.yaml' | sort > changed-agents.txt
          fi

      - name: Check Agent Card availability
        timeout-minutes: 5
        run: python scripts/health-check.py --agent-card-only --paths-file changed-agents.txt --output health-results.json

      - name: Upload health results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-health-results
          path: health-results.json
